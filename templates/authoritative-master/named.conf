// Authoritative Master DNS Server
// Hosts forward and reverse zones and notifies slaves

options {
    directory "/var/cache/bind";

    listen-on { any; };
    listen-on-v6 { none; };

    recursion no;
    allow-query { any; };
};

zone "example.com" IN {
    type master;
    file "/bind/etc/zones/db.example.com";
};

zone "100.168.192.in-addr.arpa" IN {
    type master;
    file "/bind/etc/zones/db.192.168.100";
};
